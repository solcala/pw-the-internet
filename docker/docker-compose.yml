# Playwright Docker parity — same commands locally (Gate 1.3) and in CI (Gate 2)
# npm run docker:test:smoke      → test-smoke service
# npm run docker:test:regression → test-regression service
# npm run docker:test:ci         → test-ci service
# npm run docker:lint            → lint service

services:
  base:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
      - /app/node_modules
    working_dir: /app
    environment:
      - CI=true
      - BASE_URL=${BASE_URL:-https://the-internet.herokuapp.com/}

  test-smoke:
    extends: base
    command: npm run test:smoke

  test-regression:
    extends: base
    command: npm run test:regression

  test-ci:
    extends: base
    command: npm run test:ci

  lint:
    extends: base
    command: sh -c "npm run lint && npm run typecheck"
