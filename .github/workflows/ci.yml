name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Lint and typecheck (Docker)
        run: docker compose -f docker/docker-compose.yml run --rm lint

      - name: Job summary
        if: always()
        run: |
          echo "## Gate 2 — Lint & Typecheck" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Command |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | \`npm run lint\` |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | \`npm run typecheck\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Parity | \`docker compose run --rm lint\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY

  test:
    name: Tests (Docker)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke suite — PR gate
        if: github.event_name == 'pull_request'
        run: docker compose -f docker/docker-compose.yml run --rm test-smoke

      - name: Run CI suite — main gate
        if: github.event_name == 'push'
        run: docker compose -f docker/docker-compose.yml run --rm test-ci

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event_name }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report-${{ github.event_name }}-${{ github.run_id }}
          path: reports/junit/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload metrics report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-report-${{ github.event_name }}-${{ github.run_id }}
          path: reports/metrics/
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-traces-${{ github.run_id }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: node scripts/ci-test-summary.mjs "${{ github.event_name }}"
