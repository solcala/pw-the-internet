name: Publish Playwright Report

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  package-report:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download HTML report from CI
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: playwright-report-push-${{ github.event.workflow_run.id }}
          # Extract into playwright-report/ — download flattens to workspace root by default.
          path: playwright-report

      - name: Verify report layout
        run: |
          if [ ! -f playwright-report/index.html ]; then
            echo "::error::playwright-report/index.html not found after artifact download"
            ls -laR .
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    needs: package-report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ format('{0}', 'github-pages') }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Job summary
        if: always()
        run: |
          echo "## GitHub Pages — Playwright Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Source workflow | \`${{ github.event.workflow_run.name }}\` #${{ github.event.workflow_run.id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.deployment.outputs.page_url }}" ]; then
            echo "| Live report | ${{ steps.deployment.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          fi
